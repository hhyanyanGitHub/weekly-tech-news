# ==========================
# 重要性评分配置
# ==========================
importance_scoring:
  
  # 数据源权威性倍数（越高表示越权威）
  source_authority:
    # 最高权威（1.5倍及以上）
    "DARPA": 1.5
    "DARPA Official": 1.5
    "DARPA News": 1.5
    "NATO": 1.4
    "NATO Cyber": 1.4
    "NATO Cyber Operations": 1.5
    "US DoD": 1.4
    "Department of Defense": 1.4
    "Pentagon": 1.4
    "Joint Chiefs of Staff": 1.4
    
    # 高权威（1.2-1.3倍）
    "CISA": 1.3
    "CISA Alerts": 1.3
    "Defense News": 1.2
    "Army News": 1.2
    "Army News Service": 1.2
    "Military & Aerospace": 1.2
    "IEEE Spectrum": 1.2
    "ArXiv": 1.1
    
    # 中等权威（1.0-1.1倍）
    "CyberScoop": 1.1
    "Space News": 1.1
    "Official Release": 1.2
    
    # 默认权重
    "default": 0.9

  # 内容新鲜度衰减
  freshness_decay:
    max_score_hours: 1
    half_life_days: 7

  # 关键词匹配度提升
  keyword_boost:
    high_relevance: 1.4
    medium_relevance: 1.2
    low_relevance: 1.0

# ==========================
# 排序和限制
# ==========================
sorting:
  primary: "importance_score"
  secondary: "publish_date"
  order: "descending"

limits:
  max_items_per_digest: 10
  min_items_per_digest: 3
  max_items_per_category: 4  # 每个分类最多4条

# ==========================
# 过滤规则
# ==========================
filters:
  min_relevance_score: 0.6
  min_content_length: 50
  max_age_days: 30
  
  # 排除关键词
  exclude_keywords:
    - "opinion"
    - "advertisement"
    - "unrelated"

# ==========================
# 输出配置
# ==========================
output:
  language: "chinese_english"  # 中英文对照
  summary_length: 150  # 摘要字数
  include_source: true
  include_date: true
  include_importance_score: true
